name: Generate Snake

on:
  # Her 24 saatte bir otomatik çalış / Run every 24 hours
  schedule:
    - cron: "0 */24 * * *"
  # Manuel tetikleme / Manual trigger
  workflow_dispatch:
  # Main branch'e her push'ta çalış / Run on every push to main
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: Ygty324
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Push github-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4.0.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
